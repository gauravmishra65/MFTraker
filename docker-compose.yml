version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tracker
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: production
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      JWT_EXPIRES_IN: 24h
      MARKET_PROVIDER: yahoo
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run seed && node dist/index.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000/ws
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  pgdata:
